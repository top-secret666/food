services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network
    profiles: ["infra", "kafka", "all"]

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network
    profiles: ["infra", "kafka", "all"]

  user-db:
    image: postgres:14
    container_name: user-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    profiles: ["dbs", "all"]

  restaurant-db:
    image: postgres:14
    container_name: restaurant-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: restaurant_db
    volumes:
      - restaurant_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    profiles: ["dbs", "all"]

  order-db:
    image: postgres:14
    container_name: order-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order_db
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    profiles: ["dbs", "all"]

  keycloak-db:
    image: postgres:14
    container_name: keycloak-db
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    profiles: ["keycloak", "all"]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    volumes:
      - ./master-realm.json:/opt/keycloak/data/import/master-realm.json:ro
    networks:
      - app-network
    profiles: ["keycloak", "all"]

  keycloak-init:
    image: curlimages/curl:8.6.0
    container_name: keycloak-init
    depends_on:
      - keycloak
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_REALM: rgr
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./keycloak-init.sh:/scripts/keycloak-init.sh:ro
    entrypoint: ["/bin/sh", "/scripts/keycloak-init.sh"]
    networks:
      - app-network
    profiles: ["keycloak", "all"]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network
    profiles: ["keycloak", "all"]

  user-service:
    build: ./user-service
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/rgr
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/rgr/protocol/openid-connect/certs
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      REQUIRE_EMAIL_VERIFIED: ${REQUIRE_EMAIL_VERIFIED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - user-db
      - keycloak
    networks:
      - app-network
    profiles: ["apps", "all"]

  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://restaurant-db:5432/restaurant_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/rgr
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/rgr/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REQUIRE_EMAIL_VERIFIED: ${REQUIRE_EMAIL_VERIFIED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - restaurant-db
      - keycloak
      - kafka
    networks:
      - app-network
    profiles: ["apps", "all"]

  order-service:
    build: ./order-service
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/rgr
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/rgr/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      USER_SERVICE_URL: http://user-service:8084
      RESTAURANT_SERVICE_URL: http://restaurant-service:8081
      REQUIRE_EMAIL_VERIFIED: ${REQUIRE_EMAIL_VERIFIED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - order-db
      - keycloak
      - kafka
      - user-service
      - restaurant-service
    networks:
      - app-network
    profiles: ["apps", "all"]

volumes:
  user_db_data:
  restaurant_db_data:
  order_db_data:
  keycloak_db_data:

networks:
  app-network:
    driver: bridge